<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Egg Cooking Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#fdf6ec;--bg2:#fff8f0;--surface:#ffffff;--surface2:#fef3e2;
    --border:#e8d5b5;--text:#2c1810;--text2:#6b4c35;--text3:#9e7b5e;
    --yolk:#f5a623;--yolk-dark:#d4881a;--yolk-light:#ffc94a;
    --accent:#c0392b;--green:#27ae60;
    --shadow:rgba(44,24,16,0.1);--shadow2:rgba(44,24,16,0.18);
    --card-hover:#fff3e0;--progress-track:#e8d5b5;
  }
  [data-theme="dark"]{
    --bg:#1a0f08;--bg2:#221408;--surface:#2c1810;--surface2:#3a2010;
    --border:#4a2e1a;--text:#fdf6ec;--text2:#d4a87a;--text3:#9e7b5e;
    --yolk:#f5a623;--yolk-dark:#d4881a;--yolk-light:#ffc94a;
    --shadow:rgba(0,0,0,0.4);--shadow2:rgba(0,0,0,0.6);
    --card-hover:#3a2010;--progress-track:#3a2010;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse at 20% 20%,rgba(245,166,35,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(192,57,43,.04) 0%,transparent 60%);pointer-events:none;z-index:0}
  header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);padding:0 2rem;height:68px;display:flex;align-items:center;justify-content:space-between;transition:background .4s}
  .logo{display:flex;align-items:center;gap:.7rem;font-family:'Playfair Display',serif;font-weight:900;font-size:1.5rem;color:var(--text);letter-spacing:-.02em}
  .logo-img{width:36px;height:36px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
  .logo span{color:var(--yolk)}
  .dark-toggle{background:var(--surface2);border:1.5px solid var(--border);border-radius:50px;width:52px;height:28px;cursor:pointer;position:relative;transition:all .3s;display:flex;align-items:center;padding:3px}
  .toggle-knob{width:20px;height:20px;border-radius:50%;background:var(--yolk);display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.34,1.56,.64,1);font-size:12px;line-height:1}
  [data-theme="dark"] .toggle-knob{transform:translateX(24px);background:#3a2010}
  main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}
  .hero{text-align:center;margin-bottom:2.5rem;animation:fadeUp .6s ease both}
  .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;line-height:1.1;margin-bottom:.5rem}
  .hero h1 em{color:var(--yolk);font-style:normal}
  .hero p{color:var(--text3);font-size:1.05rem;font-weight:300}
  .section-label{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--text2);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;animation:fadeUp .6s .1s ease both}
  .section-label svg{width:22px;height:22px;flex-shrink:0}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:1rem;margin-bottom:1.5rem;animation:fadeUp .6s .15s ease both}
  .egg-card{background:var(--surface);border:2px solid var(--border);border-radius:18px;padding:1.2rem .8rem 1rem;cursor:pointer;text-align:center;transition:all .25s cubic-bezier(.34,1.2,.64,1);position:relative;overflow:hidden;user-select:none}
  .egg-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--yolk-light) 0%,transparent 60%);opacity:0;transition:opacity .3s}
  .egg-card:hover{border-color:var(--yolk);transform:translateY(-4px);box-shadow:0 12px 32px var(--shadow2);background:var(--card-hover)}
  .egg-card:hover::before{opacity:.08}
  .egg-card.selected{border-color:var(--yolk);background:var(--surface2);box-shadow:0 0 0 3px rgba(245,166,35,.25),0 12px 32px var(--shadow2);transform:translateY(-2px)}
  .egg-card.selected::before{opacity:.12}
  .egg-img-wrap{width:72px;height:72px;margin:0 auto .6rem;display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 3px 8px rgba(0,0,0,.15))}
  .egg-img-wrap svg{width:100%;height:100%}
  .egg-card:hover .egg-img-wrap{transform:scale(1.15) rotate(-4deg)}
  .egg-card.selected .egg-img-wrap{transform:scale(1.08)}
  .egg-name{font-weight:600;font-size:.82rem;color:var(--text);line-height:1.3;margin-bottom:.3rem;position:relative}
  .egg-time{font-size:.75rem;color:var(--text3);font-weight:400;position:relative}
  .egg-badge{position:absolute;top:8px;right:8px;background:var(--yolk);color:white;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:20px;opacity:0;transform:scale(0);transition:all .3s cubic-bezier(.34,1.56,.64,1);letter-spacing:.05em;text-transform:uppercase;z-index:1}
  .egg-card.selected .egg-badge{opacity:1;transform:scale(1)}
  .timer-section{background:var(--surface);border:2px solid var(--border);border-radius:28px;padding:2.5rem 2rem;margin-top:1.5rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;animation:fadeUp .6s .2s ease both;transition:all .4s;position:relative;overflow:hidden}
  .timer-section.active{border-color:var(--yolk);box-shadow:0 0 0 3px rgba(245,166,35,.15),0 20px 60px var(--shadow)}
  .timer-section.done{border-color:var(--green);box-shadow:0 0 0 3px rgba(39,174,96,.2),0 20px 60px rgba(39,174,96,.1);animation:donePulse 1s ease}
  .timer-selected-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--text2);text-align:center;min-height:1.8rem;transition:all .3s}
  .clock-ring{position:relative;width:200px;height:200px;flex-shrink:0}
  .clock-ring svg.ring-svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ring-track{fill:none;stroke:var(--progress-track);stroke-width:10}
  .ring-progress{fill:none;stroke:var(--yolk);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s}
  .timer-section.done .ring-progress{stroke:var(--green)}
  .clock-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .ring-egg-preview{width:46px;height:46px;transition:all .4s;filter:drop-shadow(0 2px 6px rgba(0,0,0,.15))}
  .ring-egg-preview svg{width:100%;height:100%}
  .time-display{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:900;letter-spacing:-.03em;color:var(--text);line-height:1;transition:color .3s}
  .timer-section.done .time-display{color:var(--green)}
  .time-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:500}
  .done-msg{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--green);text-align:center;opacity:0;transform:scale(.8);transition:all .5s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:.5rem;min-height:2rem}
  .timer-section.done .done-msg{opacity:1;transform:scale(1)}
  .btn-group{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center}
  .btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;border:none;border-radius:50px;padding:.7rem 1.8rem;cursor:pointer;transition:all .22s cubic-bezier(.34,1.2,.64,1);display:flex;align-items:center;gap:.4rem;letter-spacing:.01em}
  .btn:active{transform:scale(.96)}
  .btn-start{background:var(--yolk);color:white;box-shadow:0 4px 16px rgba(245,166,35,.4)}
  .btn-start:hover{background:var(--yolk-dark);box-shadow:0 6px 24px rgba(245,166,35,.5);transform:translateY(-2px)}
  .btn-pause{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
  .btn-pause:hover{background:var(--border);transform:translateY(-2px)}
  .btn-reset{background:transparent;color:var(--text3);border:1.5px solid var(--border)}
  .btn-reset:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
  .egg-burst{position:absolute;pointer-events:none;font-size:1.8rem;animation:burst 1.1s ease forwards;opacity:0}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes donePulse{0%{transform:scale(1)}30%{transform:scale(1.02)}60%{transform:scale(.99)}100%{transform:scale(1)}}
  @keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1.2)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
  @keyframes tick{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .ticking .time-display{animation:tick 1s ease infinite}
  @media(max-width:600px){
    .cards-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.75rem}
    .timer-section{padding:1.8rem 1.2rem}
    .clock-ring{width:170px;height:170px}
    .time-display{font-size:2rem}
    header{padding:0 1rem}
    main{padding:1.5rem 1rem 3rem}
    .egg-img-wrap{width:60px;height:60px}
  }
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg class="logo-img" viewBox="0 0 60 70" fill="none">
      <ellipse cx="30" cy="38" rx="24" ry="28" fill="#f9f0e1" stroke="#e8d5b5" stroke-width="2"/>
      <ellipse cx="30" cy="40" rx="10" ry="10" fill="#f5a623"/>
      <ellipse cx="27" cy="37" rx="3" ry="2.5" fill="#ffc94a" opacity=".7"/>
    </svg>
    Egg<span>Timer</span>
  </div>
  <button class="dark-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <div class="toggle-knob">☀️</div>
  </button>
</header>

<main>

    <h1>Always get perfect eggs</h1>
    <p>Choose your style </p>
  </div>

  <div class="section-label">
    <svg viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="14" rx="8" ry="9" fill="#f9f0e1" stroke="#e0cca8" stroke-width="1.5"/><ellipse cx="12" cy="15" rx="4" ry="4" fill="#f5a623"/></svg>
    Boiled Eggs
  </div>
  <div class="cards-grid" id="boiledGrid"></div>

  <div class="section-label">
    <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="16" width="18" height="4" rx="2" fill="#888" opacity=".7"/><ellipse cx="12" cy="14" rx="8" ry="4" fill="#f9f0e1"/><ellipse cx="12" cy="13" rx="4" ry="3.5" fill="#f5a623"/></svg>
    Fried &amp; Other
  </div>
  <div class="cards-grid" id="friedGrid"></div>

  <div class="timer-section" id="timerSection">
    <div class="timer-selected-name" id="selectedName">Select an egg to begin</div>
    <div class="clock-ring" id="clockRing">
      <svg class="ring-svg" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="52"/>
        <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
      </svg>
      <div class="clock-center">
        <div class="ring-egg-preview" id="ringPreview"></div>
        <div class="time-display" id="timeDisplay">--:--</div>
        <div class="time-label">remaining</div>
      </div>
    </div>
    <div class="done-msg" id="doneMsg">🎉 Your egg is ready!</div>
    <div class="btn-group">
      <button class="btn btn-start" id="btnStart" disabled>▶ Start</button>
      <button class="btn btn-pause" id="btnPause" disabled>⏸ Pause</button>
      <button class="btn btn-reset" id="btnReset" disabled>↺ Reset</button>
    </div>
  </div>
</main>

    {id:'very-soft', name:'Very Soft Boiled', time:210, desc:'3–4 min<br>Runny yolk, barely set whites'},
    {id:'soft',      name:'Soft Boiled',      time:360, desc:'6 min<br>Runny yolk, firm tender whites'},
    {id:'jammy',     name:'Jammy',            time:420, desc:'7 min<br>Thick custardy yolk, fully set whites'},
    {id:'medium',    name:'Medium Boiled',    time:480, desc:'8 min<br>Creamy yolk, fully firm whites'},
    {id:'hard',      name:'Hard Boiled',      time:600, desc:'10 min<br>Fully set yolk and whites'},
    {id:'fully-hard',name:'Fully Hard Boiled',time:720, desc:'12 min<br>Dry crumbly yolk, firm whites'},
  ],
  fried:[
    {id:'sunny',    name:'Sunny Side Up',      time:180, desc:'3 min<br>Runny yolk, set bottom whites'},
    {id:'over-easy',name:'Over Easy / Medium', time:240, desc:'2 min + flip<br>Flipped egg, soft to jammy yolk'},
    {id:'scrambled',name:'Scrambled Eggs',     time:180, desc:'3 min<br>Soft curds, fluffy mixed eggs'},
  ]
};

let selected=null,totalTime=0,remaining=0,interval=null,running=false;
const boiledGrid=document.getElementById('boiledGrid');
const friedGrid=document.getElementById('friedGrid');
const timerSec=document.getElementById('timerSection');
const selectedName=document.getElementById('selectedName');
const timeDisplay=document.getElementById('timeDisplay');
const doneMsg=document.getElementById('doneMsg');
const ringProgress=document.getElementById('ringProgress');
const ringPreview=document.getElementById('ringPreview');
const clockRing=document.getElementById('clockRing');
const btnStart=document.getElementById('btnStart');
const btnPause=document.getElementById('btnPause');
const btnReset=document.getElementById('btnReset');
const CIRC=326.73;

function renderCards(eggs,container){
  eggs.forEach(egg=>{
    const card=document.createElement('div');
    card.className='egg-card';
    card.dataset.id=egg.id;
    card.innerHTML=`<span class="egg-badge">✓</span><div class="egg-img-wrap">${SVG[egg.id]}</div><div class="egg-name">${egg.name}</div><div class="egg-time">${egg.desc}</div>`;
    card.addEventListener('click',()=>selectEgg(egg,card));
    container.appendChild(card);
  });
}
renderCards(EGGS.boiled,boiledGrid);
renderCards(EGGS.fried,friedGrid);

function selectEgg(egg,card){
  document.querySelectorAll('.egg-card').forEach(c=>c.classList.remove('selected'));
  card.classList.add('selected');
  stopTimer();
  selected=egg; totalTime=egg.time; remaining=egg.time;
  selectedName.textContent=egg.name;
  updateDisplay(remaining); setRing(1);
  ringPreview.innerHTML=SVG[egg.id];
  timerSec.classList.remove('active','done');
  doneMsg.style.display='none';
  btnStart.disabled=false; btnStart.textContent='▶ Start';
  btnPause.disabled=true; btnReset.disabled=false;
  if(window.innerWidth<768) timerSec.scrollIntoView({behavior:'smooth',block:'start'});
}

function updateDisplay(s){
  timeDisplay.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function setRing(r){ringProgress.style.strokeDashoffset=CIRC*(1-Math.max(0,r));}
function startTimer(){
  if(!selected||running)return;
  running=true; timerSec.classList.add('active'); timerSec.classList.remove('done');
  doneMsg.style.display='none'; clockRing.classList.add('ticking');
  btnStart.disabled=true; btnPause.disabled=false;
  interval=setInterval(()=>{
    remaining--; updateDisplay(remaining); setRing(remaining/totalTime);
    if(remaining<=0){clearInterval(interval);running=false;onDone();}
  },1000);
}
function pauseTimer(){
  if(!running)return; clearInterval(interval); running=false;
  clockRing.classList.remove('ticking');
  btnStart.disabled=false; btnStart.textContent='▶ Resume'; btnPause.disabled=true;
}
function stopTimer(){clearInterval(interval);running=false;clockRing.classList.remove('ticking');}
function resetTimer(){
  stopTimer();
  if(selected){remaining=totalTime;updateDisplay(remaining);setRing(1);}
  else{timeDisplay.textContent='--:--';setRing(0);}
  timerSec.classList.remove('active','done'); doneMsg.style.display='none';
  btnStart.textContent='▶ Start'; btnStart.disabled=!selected;
  btnPause.disabled=true; btnReset.disabled=!selected;
}
function onDone(){
  timerSec.classList.remove('active'); timerSec.classList.add('done');
  clockRing.classList.remove('ticking'); doneMsg.style.display='flex';
  btnStart.disabled=true; btnPause.disabled=true;
  playChime(); spawnBursts();
}
function playChime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;o.type='sine';
      const t=ctx.currentTime+i*.18;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.05);
      g.gain.exponentialRampToValueAtTime(.001,t+.55);o.start(t);o.stop(t+.6);
    });
  }catch(e){}
}
function spawnBursts(){
  const items=['✨','⭐','💛','🌟','🍳'];
  for(let i=0;i<12;i++){
    const el=document.createElement('div');
    el.className='egg-burst';
    el.textContent=items[Math.floor(Math.random()*items.length)];
    el.style.setProperty('--dx',((Math.random()-.5)*220)+'px');
    el.style.setProperty('--dy',((Math.random()-.5)*180-30)+'px');
    el.style.left=(30+Math.random()*40)+'%';
    el.style.top=(20+Math.random()*50)+'%';
    el.style.animationDelay=(Math.random()*.35)+'s';
    timerSec.appendChild(el);
    setTimeout(()=>el.remove(),1500);
  }
}
btnStart.addEventListener('click',startTimer);
btnPause.addEventListener('click',pauseTimer);
btnReset.addEventListener('click',()=>{btnStart.textContent='▶ Start';resetTimer();});
const themeToggle=document.getElementById('themeToggle');
const knob=themeToggle.querySelector('.toggle-knob');
themeToggle.addEventListener('click',()=>{
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  knob.textContent=isDark?'☀️':'🌙';
});
</script>
</body>
